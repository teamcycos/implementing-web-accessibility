# Run all a11y checks
name: A11y Checks

# Controls when the action will run.
on:
  # Allows you to call this workflow from other workflows
  workflow_call:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

jobs:
  read-playwright-version:
    name: '🏷️ Read Playwright Version'
    runs-on: ubuntu-latest
    outputs:
      playwright-version: ${{ steps.get_playwright_version.outputs.playwright-version }}
    steps:
      - name: '☁️ Checkout repository'
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - id: get_playwright_version
        uses: atos-actions/get-playwright-version@v2

  lint-and-unit:
    name: '🧹 Lint & Unit Tests'
    runs-on: ubuntu-latest
    needs: read-playwright-version
    container: mcr.microsoft.com/playwright:${{ needs.read-playwright-version.outputs.playwright-version }}

    steps:
      - name: '☁️ Checkout repository'
        uses: actions/checkout@v7

      - name: '⚙️ Use Node.js'
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          check-latest: true
          cache: 'npm'

      - name: '🧼 Clean up build artifacts'
        run: |
          for dir in results; do
            if [ -e "$dir" ]; then
              echo "Removing $dir..."
              rm -rf "$dir"
            fi
          done
          exit 0

      - name: '⛓️ Install dependencies'
        run: npm ci --no-audit --prefer-offline --progress=false

      - name: '🧫 Run lint Code'
        run: npm run lint

      - name: '🧫 Run Unit tests'
        run: npm run test

      - name: '📤 Upload test results'
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: results

  playwright-a11y:
    name: '🎭 Playwright a11y Tests'
    runs-on: ubuntu-latest
    needs: read-playwright-version
    container: mcr.microsoft.com/playwright:${{ needs.read-playwright-version.outputs.playwright-version }}

    steps:
      - name: '☁️ Checkout repository'
        uses: actions/checkout@v7

      - name: '⚙️ Use Node.js'
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          check-latest: true
          cache: 'npm'

      - name: '🧼 Clean up build artifacts'
        run: |
          for dir in playwright-report; do
            if [ -e "$dir" ]; then
              echo "Removing $dir..."
              rm -rf "$dir"
            fi
          done
          exit 0

      - name: '⛓️ Install dependencies'
        run: npm ci --no-audit --prefer-offline --progress=false

      - name: '🌍 Update browsers'
        run: npx playwright install

      - name: '🌍 Point Puppeteer at Playwright Chromium'
        run: |
          PW_CHROME_PATH=$(node -e "console.log(require(\"playwright\").chromium.executablePath())")
          echo "PUPPETEER_EXECUTABLE_PATH=$PW_CHROME_PATH" >> "$GITHUB_ENV"

      - name: '🧫 Run Playwright a11y tests'
        run: npm run test:a11y

      - name: '📤 Upload test results'
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: playwright-report

  cypress-e2e:
    name: '🌳 Cypress E2E Tests'
    runs-on: ubuntu-latest
    container: cypress/included:latest

    steps:
      - name: '☁️ Checkout repository'
        uses: actions/checkout@v7

      - name: '⚙️ Use Node.js'
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          check-latest: true
          cache: 'npm'

      - name: '⛓️ Install dependencies'
        run: npm ci --no-audit --prefer-offline --progress=false

      - name: '🌍 Point Puppeteer at container Chrome'
        run: |
          CHROME_PATH=$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)
          if [ -z "$CHROME_PATH" ]; then
            echo "No Chrome/Chromium binary found in cypress/included container" >&2
            exit 1
          fi
          echo "Using Chrome at: $CHROME_PATH"
          echo "PUPPETEER_EXECUTABLE_PATH=$CHROME_PATH" >> "$GITHUB_ENV"

      - name: '🧫 Run Cypress E2E tests'
        run: npm run test:cypress

      - name: '📤 Upload test results'
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-test-results
          path: cypress/videos
